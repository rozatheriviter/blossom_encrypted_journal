<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#141428"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00e8c6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00e8c6" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Glow halo -->
  <ellipse cx="64" cy="64" rx="40" ry="40" fill="url(#glow)"/>

  <!-- Stylised open book / blossom petals -->
  <!-- Spine line -->
  <line x1="64" y1="30" x2="64" y2="98"
        stroke="#00e8c6" stroke-width="2" stroke-linecap="round"
        filter="url(#neon)" opacity="0.9"/>

  <!-- Left page -->
  <path d="M64 34 Q36 42 34 64 Q36 86 64 94"
        fill="none" stroke="#00e8c6" stroke-width="2.5"
        stroke-linecap="round" filter="url(#neon)" opacity="0.85"/>

  <!-- Left page lines -->
  <line x1="41" y1="54" x2="61" y2="51" stroke="#00e8c6" stroke-width="1" opacity="0.40"/>
  <line x1="39" y1="62" x2="61" y2="61" stroke="#00e8c6" stroke-width="1" opacity="0.40"/>
  <line x1="40" y1="70" x2="61" y2="71" stroke="#00e8c6" stroke-width="1" opacity="0.40"/>

  <!-- Right page -->
  <path d="M64 34 Q92 42 94 64 Q92 86 64 94"
        fill="none" stroke="#00e8c6" stroke-width="2.5"
        stroke-linecap="round" filter="url(#neon)" opacity="0.85"/>

  <!-- Right page lines -->
  <line x1="67" y1="51" x2="87" y2="54" stroke="#00e8c6" stroke-width="1" opacity="0.40"/>
  <line x1="67" y1="61" x2="89" y2="62" stroke="#00e8c6" stroke-width="1" opacity="0.40"/>
  <line x1="67" y1="71" x2="88" y2="70" stroke="#00e8c6" stroke-width="1" opacity="0.40"/>

  <!-- Neon dot at top spine -->
  <circle cx="64" cy="30" r="3" fill="#00e8c6" filter="url(#neon)"/>
  <!-- Magenta accent dot -->
  <circle cx="64" cy="98" r="2.5" fill="#c800ff" filter="url(#neon)"/>
</svg>
